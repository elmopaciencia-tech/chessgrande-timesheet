<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Sign Up | Chess Grande Payroll</title>
  <style>
    :root {
      --bg: oklch(95.6% 0.015 96);
      --bg-soft: oklch(97.3% 0.01 96);
      --surface: oklch(98.5% 0.008 96);
      --surface-strong: oklch(99.1% 0.006 96);
      --surface-muted: oklch(96.8% 0.012 96);
      --surface-accent: oklch(94.6% 0.022 174);
      --ink: oklch(25.6% 0.028 178);
      --muted: oklch(52.4% 0.018 178);
      --line: oklch(84.8% 0.012 178);
      --accent: oklch(43.5% 0.076 177);
      --clay: oklch(57.5% 0.108 44);
      --focus: oklch(66% 0.104 44);
      --shadow-lg: 0 24px 56px rgba(61, 52, 36, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(191, 114, 71, 0.12), transparent 26%),
        radial-gradient(circle at top right, rgba(49, 99, 92, 0.10), transparent 24%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 58%, oklch(94.8% 0.014 96) 100%);
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      padding: 18px;
    }
    :focus { outline: none; }
    :focus-visible { outline: 3px solid color-mix(in srgb, var(--focus) 72%, white 28%); outline-offset: 3px; }
    .card {
      width: min(520px, 100%);
      background: linear-gradient(135deg, color-mix(in srgb, var(--surface) 86%, white 14%) 0%, color-mix(in srgb, var(--surface-muted) 74%, white 26%) 100%);
      border: 1px solid color-mix(in srgb, var(--line) 72%, white 28%);
      border-radius: 32px;
      box-shadow: var(--shadow-lg);
      padding: 32px;
    }
    h1 {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.15rem, 8vw, 3.4rem);
      line-height: .95;
      font-weight: 400;
      text-wrap: balance;
    }
    p { margin: 0 0 18px; color: var(--muted); }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: .84rem; font-weight: 600; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      margin-bottom: 14px;
      min-height: 52px;
      background: color-mix(in srgb, var(--surface-strong) 90%, white 10%);
      color: var(--ink);
    }
    .actions { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 4px; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: var(--surface-strong);
      min-height: 46px;
    }
    .status {
      margin-top: 12px;
      min-height: 22px;
      color: var(--clay);
      font-weight: 600;
    }
    .footnote { margin: 14px 0 0; font-size: 0.9rem; color: var(--muted); }
    .footnote a { color: var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Create Employee Account</h1>
    <p>Sign up with your name, email, and password.</p>

    <form id="signupForm">
      <label for="fullName">Full name</label>
      <input id="fullName" type="text" autocomplete="name" required>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password" required>

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" required>

      <div class="actions">
        <button type="submit" id="signupButton">Create Account</button>
      </div>
      <div class="status" id="statusMessage"></div>
    </form>
    <p class="footnote"><a href="./login.html">Back to login</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-client.js"></script>
  <script>
    const signupForm = document.getElementById("signupForm");
    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const statusMessage = document.getElementById("statusMessage");

    signupForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusMessage.textContent = "";

      const fullName = fullNameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!fullName || !email || !password || !confirmPassword) {
        statusMessage.textContent = "Please complete all fields.";
        return;
      }
      if (password !== confirmPassword) {
        statusMessage.textContent = "Passwords do not match.";
        return;
      }

      statusMessage.textContent = "Creating account...";
      const { data, error } = await window.supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: { full_name: fullName },
        },
      });

      if (error) {
        statusMessage.textContent = error.message || "Sign up failed.";
        return;
      }

      const userId = data.user && data.user.id;
      if (userId && data.session) {
        const { error: profileError } = await window.supabaseClient
          .from("profiles")
          .upsert(
            { id: userId, full_name: fullName, role: "employee" },
            { onConflict: "id" }
          );
        if (profileError) {
          statusMessage.textContent = `Account created, but profile setup is still required after login: ${profileError.message}`;
          return;
        }
      }

      statusMessage.textContent = "Account created. Check your email if confirmation is required, then log in.";
      signupForm.reset();
    });
  </script>
</body>
</html>
