<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Login | Chess Grande Payroll</title>
  <style>
    :root {
      --bg: oklch(95.6% 0.015 96);
      --bg-soft: oklch(97.3% 0.01 96);
      --surface: oklch(98.5% 0.008 96);
      --surface-strong: oklch(99.1% 0.006 96);
      --surface-muted: oklch(96.8% 0.012 96);
      --surface-accent: oklch(94.6% 0.022 174);
      --ink: oklch(25.6% 0.028 178);
      --ink-soft: oklch(39.8% 0.02 178);
      --muted: oklch(52.4% 0.018 178);
      --line: oklch(84.8% 0.012 178);
      --line-strong: oklch(76.8% 0.018 178);
      --accent: oklch(43.5% 0.076 177);
      --accent-soft: oklch(91.4% 0.028 175);
      --clay: oklch(57.5% 0.108 44);
      --clay-soft: oklch(92.6% 0.03 44);
      --focus: oklch(66% 0.104 44);
      --shadow-lg: 0 24px 56px rgba(61, 52, 36, 0.10);
      --shadow-sm: 0 8px 18px rgba(61, 52, 36, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(191, 114, 71, 0.12), transparent 26%),
        radial-gradient(circle at top right, rgba(49, 99, 92, 0.10), transparent 24%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 58%, oklch(94.8% 0.014 96) 100%);
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      padding: 18px;
    }
    :focus { outline: none; }
    :focus-visible { outline: 3px solid color-mix(in srgb, var(--focus) 72%, white 28%); outline-offset: 3px; }
    .card {
      width: min(520px, 100%);
      background: linear-gradient(135deg, color-mix(in srgb, var(--surface) 86%, white 14%) 0%, color-mix(in srgb, var(--surface-muted) 74%, white 26%) 100%);
      border: 1px solid color-mix(in srgb, var(--line) 72%, white 28%);
      border-radius: 32px;
      box-shadow: var(--shadow-lg);
      padding: 32px;
    }
    h1 {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.15rem, 8vw, 3.4rem);
      line-height: .95;
      font-weight: 400;
      text-wrap: balance;
    }
    p { margin: 0 0 18px; color: var(--muted); }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: .84rem; font-weight: 600; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      margin-bottom: 14px;
      min-height: 52px;
      background: color-mix(in srgb, var(--surface-strong) 90%, white 10%);
      color: var(--ink);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 4px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      min-height: 46px;
    }
    .primary { background: var(--accent); color: var(--surface-strong); }
    .secondary { background: var(--clay-soft); color: var(--clay); }
    .status {
      margin-top: 12px;
      min-height: 22px;
      color: var(--clay);
      font-weight: 600;
    }
    .notice {
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-accent) 26%, var(--surface-strong) 74%);
      color: var(--ink-soft);
      font-size: 0.95rem;
    }
    .footnote {
      margin: 14px 0 0;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .footnote a {
      color: var(--accent);
    }
    .signup-link {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Chess Grande Payroll Portal</h1>
    <p>Secure sign-in for authorized Chess Grande employees and managers.</p>
    <p class="notice">Private payroll system: do not enter credentials anywhere else.</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>

      <div class="actions">
        <button class="primary" type="submit" id="loginButton">Log In</button>
      </div>
      <div class="status" id="statusMessage"></div>
    </form>
    <p class="footnote"><a class="signup-link" href="./signup.html">Create a new account</a></p>
    <p class="footnote">By signing in, you agree to payroll data handling described in <a href="./privacy.html">Privacy & Security Notice</a>.</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-client.js"></script>
  <script>
    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const statusMessage = document.getElementById("statusMessage");
    const nextParam = new URLSearchParams(window.location.search).get("next");
    const nextUrl = getSafeNextUrl(nextParam);

    init();

    async function init() {
      const { data } = await window.supabaseClient.auth.getUser();
      if (data.user) {
        window.location.href = nextUrl;
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusMessage.textContent = "Logging in...";
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        statusMessage.textContent = error.message || "Login failed.";
        return;
      }
      statusMessage.textContent = "Logged in. Redirecting...";
      window.location.href = nextUrl;
    });

    function getSafeNextUrl(value) {
      const raw = String(value || "").trim();
      if (!raw || /^(?:[a-z][a-z0-9+.-]*:)?\/\//i.test(raw)) {
        return "./chess-timesheet.html";
      }
      if (raw.includes("login.html") || raw.includes("signup.html")) {
        return "./chess-timesheet.html";
      }
      return raw.startsWith("./") ? raw : `./${raw.replace(/^\/+/, "")}`;
    }

  </script>
</body>
</html>
